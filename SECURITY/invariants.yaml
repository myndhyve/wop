# WOP Security Invariants Index
#
# Each entry maps a security invariant from the threat models to one or
# more test files that verify it. The CI gate at
# `scripts/check-security-invariants.sh` reads this file and ensures
# every protocol-tier invariant has at least one matching test.
#
# Each entry has:
#   id:           unique invariant ID (matches the threat-model entry)
#   tier:         "protocol" (verifiable via conformance suite, must
#                 have a public-repo test) or "reference-impl"
#                 (verifiable only via the reference impl's own CI)
#   severity:     "critical" / "high" / "medium" / "low"
#   threat_model: which threat model file documents the invariant
#   tests:        list of file globs (relative to repo root). At least
#                 one matching file MUST exist in the public repo for
#                 protocol-tier invariants. For reference-impl-tier
#                 invariants, the globs are advisory references for the
#                 reference impl's CI.
#   note:         optional human-readable annotation
#
# Adding an invariant:
#   1. Add the invariant to its threat model with a unique ID.
#   2. Add an entry here.
#   3. If protocol-tier, ensure at least one test glob resolves.
#   4. The CI gate verifies on every push.
#
# Removing an invariant requires an RFC per RFCS/0001-rfc-process.md
# because invariants are part of the security commitment.
---

invariants:
  # ===== Secret Leakage =====

  - id: secret-leakage-eventlog-payload
    tier: protocol
    severity: critical
    threat_model: SECURITY/threat-model-secret-leakage.md
    tests:
      - conformance/src/scenarios/redaction.test.ts
    note: |
      Persisted event payloads MUST NOT contain raw key material.
      Conformance scenario drives canaries through every persistence
      surface and asserts no leak.

  - id: secret-leakage-eventlog-variable
    tier: reference-impl
    severity: high
    threat_model: SECURITY/threat-model-secret-leakage.md
    tests:
      - services/workflow-runtime/src/__tests__/redaction/runMapping.test.ts
    note: |
      Sensitive workflow variables MUST be masked per host's advertised
      compliance.defaultMode. Verified in reference impl; conformance
      coverage gated on debug-bundle scenario in LT5.

  - id: secret-leakage-otel-exception
    tier: protocol
    severity: critical
    threat_model: SECURITY/threat-model-secret-leakage.md
    tests:
      - conformance/src/scenarios/redaction.test.ts
    note: |
      Error.message and Error.stack sanitized before recordException.
      Reference impl: services/workflow-runtime/src/__tests__/redaction/otelAttributes.test.ts.

  - id: secret-leakage-otel-attribute
    tier: reference-impl
    severity: high
    threat_model: SECURITY/threat-model-secret-leakage.md
    tests:
      - services/workflow-runtime/src/__tests__/redaction/otelAttributes.test.ts
    note: |
      OTel allowlist enforced. Reference impl tests; protocol-tier
      conformance scenario added under LT5 debug-bundle work.

  - id: secret-leakage-error-envelope
    tier: protocol
    severity: critical
    threat_model: SECURITY/threat-model-secret-leakage.md
    tests:
      - conformance/src/scenarios/redaction.test.ts
      - conformance/src/scenarios/auth.test.ts
    note: |
      Canonical error envelope's message field MUST NOT leak material.

  - id: secret-leakage-auth-middleware
    tier: protocol
