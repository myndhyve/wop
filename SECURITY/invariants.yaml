  - id: secret-leakage-author-emit
    tier: advisory
    severity: low
    threat_model: SECURITY/threat-model-secret-leakage.md
    tests: []
    note: |
      Defense-in-depth advisory. Workflow validation SHOULD reject
      credential-shaped strings in declared inputs. Not a hard MUST.

