# NOTE: The Discussions link below requires GitHub Discussions to be enabled
# in repo Settings → Features. If Discussions is off, the link 404s; either
# enable Discussions or remove the entry until it's enabled.
blank_issues_enabled: false
contact_links:
  - name: Question or discussion
    url: https://github.com/myndhyve/wop/discussions
    about: Open-ended questions, design discussions, or RFC drafts.
  - name: Security disclosure
    url: https://github.com/myndhyve/wop/blob/main/SECURITY.md
    about: Coordinated disclosure for vulnerabilities. Do not file as a public issue.
