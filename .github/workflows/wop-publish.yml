# WOP spec-corpus publishing workflow.
#
# Public-repo variant. Layout in this repo: SDKs at sdk/{typescript,python,go}/,
# conformance suite at conformance/. (The MyndHyve in-tree mirror keeps the
# same files under docs/wop-spec/v1/.)
#
# Triggers — see PUBLISHING.md §"Publication policy" for the documented
# release-type matrix this implements:
#
#   Tag pattern              Triggers              Use case
#   -----------------        ----------------      -----------------------
#   v*                       all 4 publish jobs    Corpus-aligned release
#                                                  (spec patch/minor/major)
#   wop/v*                   publish-ts-client     SDK-only patch (TS)
#   wop-conformance/v*       publish-conformance   Scenario addition / suite
#                                                  bug fix
#   wop-client/v*            publish-python        SDK-only patch (Python)
#   sdk/go/v*                publish-go            SDK-only patch (Go) +
#                                                  doubles as the Go subdir
#                                                  module-discovery tag
#                                                  required by proxy.golang.org
#
# Push the most specific tag for the change. Per-package tags keep
# unrelated package versions stable (no phantom bumps).
#
# See PUBLISHING.md for the full pre-publish checklist, release-manager
# process, and rollback procedure.

name: WOP — Publish

on:
  push:
    tags:
      - 'v*'
      - 'wop/v*'
      - 'wop-conformance/v*'
      - 'wop-client/v*'
      - 'sdk/go/v*'

jobs:
  # H2 from code review: validate the tag matches a known SemVer pattern
  # before any publish job runs. Without this, `startsWith(github.ref,
  # 'refs/tags/v')` would fire on `v-anything-here` (including malformed
  # tags pushed by mistake or by a future collaborator), triggering all
  # publish jobs unintentionally. This step exits non-zero if the tag
  # doesn't conform, blocking the rest of the workflow.
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*|\
            v[0-9]*.[0-9]*.[0-9]*-*|\
            wop/v[0-9]*.[0-9]*.[0-9]*|\
            wop/v[0-9]*.[0-9]*.[0-9]*-*|\
            wop-conformance/v[0-9]*.[0-9]*.[0-9]*|\
            wop-conformance/v[0-9]*.[0-9]*.[0-9]*-*|\
            wop-client/v[0-9]*.[0-9]*.[0-9]*|\
            wop-client/v[0-9]*.[0-9]*.[0-9]*-*|\
            sdk/go/v[0-9]*.[0-9]*.[0-9]*|\
            sdk/go/v[0-9]*.[0-9]*.[0-9]*-*)
              echo "tag '$tag' matches expected SemVer pattern"
              ;;
            *)
              echo "::error::tag '$tag' does not match any expected SemVer pattern"
              echo "Expected one of:"
              echo "  vX.Y.Z[-prerelease]                       (corpus-aligned release)"
              echo "  wop/vX.Y.Z[-prerelease]                   (TS SDK only)"
              echo "  wop-conformance/vX.Y.Z[-prerelease]       (conformance only)"
              echo "  wop-client/vX.Y.Z[-prerelease]            (Python SDK only)"
              echo "  sdk/go/vX.Y.Z[-prerelease]                (Go SDK only)"
              exit 1
              ;;
          esac

  preflight:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Spec corpus consistency check
        run: bash scripts/wop-check.sh

  publish-ts-client:
    needs: preflight
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/tags/wop/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: cd sdk/typescript && npm ci
      - run: cd sdk/typescript && npm run build
      - run: cd sdk/typescript && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-conformance:
    needs: preflight
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/tags/wop-conformance/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: cd conformance && npm ci
      - run: cd conformance && npm run build:cli
      - run: cd conformance && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    needs: preflight
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/tags/wop-client/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --upgrade build twine
      - run: cd sdk/python && python -m build
      - run: cd sdk/python && twine check dist/*
      - run: cd sdk/python && twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-go:
    needs: preflight
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/tags/sdk/go/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      # Go modules are tag-based. proxy.golang.org indexes from the tag
      # automatically; this job's only purpose is to confirm vet+test
      # pass against the tagged source so consumers don't pull broken code.
      - run: cd sdk/go && go vet ./...
      - run: cd sdk/go && go test ./...
      - name: Verify Go module discoverability
        run: |
          echo "Go module is tag-driven via ${GITHUB_REF}."
          echo "Consumers can: go get github.com/myndhyve/wop/sdk/go@${VERSION}"
          echo "Cache warm-up may take ~5min for proxy.golang.org."
        env:
          # github.ref_name is the bare tag (e.g. 'sdk/go/v1.0.0' or 'v1.0.0').
          # Strip any subdir prefix so `go get @<VERSION>` looks right in logs.
          VERSION: ${{ github.ref_name }}
